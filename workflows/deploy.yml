name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: |
          # 1. Run only the Vite build to generate frontend assets
          npx vite build
          
          # 2. Rename the output folder to 'live'
          # We check if it exists first to be safe
          if [ -d "dist" ]; then
            mv dist live
          else
            echo "Build failed: dist folder not found"
            exit 1
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./live # This points to the folder you created
