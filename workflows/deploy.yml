name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main 

# This block grants the runner permission to create and push branches
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Pure Static Frontend
        # npx vite build ignores the backend server bundle and outputs clean HTML/JS to 'dist'
        run: npx vite build

      - name: Deploy to 'live' branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist   # Pushes the pure static assets from 'dist'
          publish_branch: live  # Moves them into a branch named 'live'
